<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form to Card</title>
    <style>
        .main {
            margin: 40px;
            padding: 30px;
            height: 400px;
            border: 2px solid red;
            gap: 100px;
        }

        .card {
            margin: 40px;
            padding: 20px;
            /* height: 50%; */
            max-width: 30%;
            border: 2px solid rgb(55, 53, 53);
            display: inline-block;
        }

        .profile {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-bottom: 7px;
            overflow: hidden;
        }

        .profile img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .card h5 {
            margin-top: 3px;
        }

        .card p {
            font-size: 12px;
            margin-top: 10px;
        }

    </style>
</head>
<body>
    <div class="main">
        <form>
            <input type="text" placeholder="name">
            <input type="text" placeholder="hobby">
            <input type="text" placeholder="info">
            <input type="text" placeholder="pic">
            <input type="submit">
        </form>
    </div>
    <script src="formToCard.js"></script>
</body>
</html>
