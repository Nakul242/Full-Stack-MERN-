<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Bubbling </title>
    <style>
        /* Boilerplate */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: monospace;
            color: white;
        }

        body, html {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: #1e1e1e;
        }

        .main{
            width: 100%;
            height: 100%;
        }

        .nav {
            width: 100%;
            height: 50px;
            background-color: antiquewhite;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        button {
            background-color: rgb(244, 126, 7);
            border-radius: 5px;
            width: 50px;
            color: rgb(36, 44, 44);
        }

        ul {
            padding: 50px;
        }
         
        li {
            margin: 10px;
        }

        .lt {
            text-decoration: line-through;
        }

        .box1, .box2, .box3 {
            padding: 30px;
            width: 60%;
            height: 50%;
        }
        .box1 {
            background-color: chartreuse;
        }

        .box2 {
            background-color: coral;
        }

        .box3 {
            background-color: bisque;
        }

        
    </style>
</head>
<body>
    <!-- Task 1 : if we click on the chile ele of the nav then also nav eventlistener is triggered because chlild ele does not have click event -->
    <!-- <div class="main">
        <nav class="nav">
            <a href="">Home</a>
            <a href="">about</a>
            <button type="button">click</button>
        </nav>
    </div> -->

    <!-- Task 2 : make event listerner of ul and it will work on the inside all li  -->
    <!-- <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
        <li>Grapes</li>
        <li>WaterMelon</li>
    </ul> -->

    <!-- Task 3 : make 3 div in nested form and they all have event listener and we one div is triggered its and its parents both event listerner will be fired -->
    <div class="box1">
        <div class="box2">
            <div class="box3">
                <button type="button">click</button>
            </div>
        </div>
    </div>
    <script src="bubbling.js"></script>
</body>
</html>
